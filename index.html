<body x-data="hooksApp()" :class="selectedHook ? 'hook-open' : ''">

    <header class="site-header">
        <div class="header-inner">
            <div class="header-left">
                <div class="brand">
                    <div class="brand-title">filament</div>
                    <div class="brand-sub">lifecycle hook reference</div>
                </div>

                <!-- Desktop nav -->
                <nav class="desk-nav">
                    <template x-for="group in hookGroups" :key="group.id">
                        <button
                            @click="selectedGroup = group.id; selectedHook = null"
                            :class="selectedGroup === group.id ? 'nav-btn active' : 'nav-btn'"
                            x-text="group.label">
                        </button>
                    </template>
                </nav>
            </div>

            <div class="header-right">
                <!-- Hamburger -->
                <button class="hamburger" @click="mobileMenuOpen = !mobileMenuOpen" aria-label="Menu">
                    <span class="ham-line"
                          :style="mobileMenuOpen ? 'transform:rotate(45deg) translate(4.5px,4.5px)' : ''"></span>
                    <span class="ham-line"
                          :style="mobileMenuOpen ? 'opacity:0' : ''"></span>
                    <span class="ham-line"
                          :style="mobileMenuOpen ? 'transform:rotate(-45deg) translate(4.5px,-4.5px)' : ''"></span>
                </button>

                <a href="https://github.com/andreia/filament-hooks" target="_blank" class="gh-link" aria-label="GitHub">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                </a>
            </div>
        </div>

        <!-- Mobile dropdown -->
        <div x-show="mobileMenuOpen"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 -translate-y-1"
             x-transition:enter-end="opacity-100 translate-y-0"
             x-transition:leave="transition ease-in duration-150"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             class="mobile-nav-dropdown"
             style="padding: 0 1.75rem 0.75rem;">
            <nav class="mobile-nav">
                <template x-for="group in hookGroups" :key="group.id">
                    <button
                        @click="selectedGroup = group.id; selectedHook = null; mobileMenuOpen = false"
                        :class="selectedGroup === group.id ? 'mobile-nav-btn active' : 'mobile-nav-btn'"
                        x-text="group.label">
                    </button>
                </template>
            </nav>
        </div>
    </header>

    <main class="main-wrap">

        <!-- Bulbs -->
        <div style="overflow:visible; margin-bottom:1.25rem;">
            <div id="bulbs-container" style="overflow:visible;"></div>
        </div>

        <!-- Hook detail card -->
        <div class="hook-card-wrap"
             x-show="selectedHook"
             x-transition:enter="transition ease-out duration-250"
             x-transition:enter-start="opacity-0 translate-y-2"
             x-transition:enter-end="opacity-100 translate-y-0"
             x-transition:leave="transition ease-in duration-150"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0">
            <template x-if="selectedHookData">
                <div class="hook-card">
                    <button class="close-btn" @click="selectedHook = null" aria-label="Close">
                        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>

                    <!-- Multi-method hook (e.g. mutateData) -->
                    <template x-if="selectedHookData.methods">
                        <div>
                            <template x-for="(method, idx) in selectedHookData.methods" :key="method.name">
                                <div :style="idx > 0 ? 'margin-top:2.5rem; padding-top:2rem; border-top:1px solid var(--border)' : 'padding-right:2rem'">
                                    <div class="r1" style="margin-bottom:1.75rem;">
                                        <div class="hook-fn-name" x-text="method.name + '()'"></div>
                                        <div class="hook-desc" x-text="method.description"></div>
                                        <template x-if="method.worksOn">
                                            <div class="works-on-row">
                                                <span class="works-on-label">Works on</span>
                                                <template x-for="action in method.worksOn.split(', ')" :key="action">
                                                    <span class="works-on-pill" x-text="action"></span>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                    <div class="r2" style="margin-bottom:1.5rem;">
                                        <div class="section-label">When to use</div>
                                        <p class="when-text" x-text="method.when"></p>
                                    </div>
                                    <div class="r3">
                                        <div class="section-label">Example</div>
                                        <div class="code-panel">
                                            <div class="code-chrome">
                                                <span class="dot dot-r"></span>
                                                <span class="dot dot-y"></span>
                                                <span class="dot dot-g"></span>
                                            </div>
                                            <div class="shiki-wrap"
                                                 x-html="(highlightedHtmls && highlightedHtmls[idx]) || '<div class=\'code-loading\'>highlighting…</div>'">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- Single hook (standard) -->
                    <template x-if="!selectedHookData.methods">
                        <div>
                            <div class="r1" style="margin-bottom:1.75rem; padding-right:2rem;">
                                <div class="hook-fn-name" x-text="selectedHookData.name + '()'"></div>
                                <div class="hook-desc" x-text="selectedHookData.description"></div>
                                <template x-if="selectedHookData.worksOn">
                                    <div class="works-on-row">
                                        <span class="works-on-label">Works on</span>
                                        <template x-for="action in selectedHookData.worksOn.split(', ')" :key="action">
                                            <span class="works-on-pill" x-text="action"></span>
                                        </template>
                                    </div>
                                </template>
                            </div>
                            <div class="r2" style="margin-bottom:1.5rem;">
                                <div class="section-label">When to use</div>
                                <p class="when-text" x-text="selectedHookData.when"></p>
                            </div>
                            <div class="r3">
                                <div class="section-label">Example</div>
                                <div class="code-panel">
                                    <div class="code-chrome">
                                        <span class="dot dot-r"></span>
                                        <span class="dot dot-y"></span>
                                        <span class="dot dot-g"></span>
                                    </div>
                                    <div class="shiki-wrap"
                                         x-html="highlightedHtml || '<div class=\'code-loading\'>highlighting…</div>'">
                                    </div>
                                </div>
                            </div>
                            <!-- Note block -->
                            <template x-if="selectedHookData.note">
                                <div class="note-block">
                                    <div class="note-label">Note</div>
                                    <p class="note-text" x-text="selectedHookData.note"></p>
                                    <div class="code-panel">
                                        <div class="code-chrome">
                                            <span class="dot dot-r"></span>
                                            <span class="dot dot-y"></span>
                                            <span class="dot dot-g"></span>
                                        </div>
                                        <div class="shiki-wrap"
                                             x-html="highlightedNoteHtml || '<div class=\'code-loading\'>highlighting…</div>'">
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>
        </div>

        <!-- Placeholder -->
        <div x-show="!selectedHook" class="placeholder">
            <svg width="34" height="34" fill="none" stroke="var(--text-dim)" stroke-width="1.4" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
            </svg>
            <p>select a lightbulb to explore the hook</p>
        </div>
    </main>

        made with

</body>
